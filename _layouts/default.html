<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% if page.title and page.title != "Home" %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />
  </head>
  <body class="{{ page.page_class | default: 'page-default' }}">
    <header class="site-header">
      {% include nav.html %}
    </header>

    <main class="site-main">
      <div class="container page-frame">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-layout">
          <div>
            <p class="footer-title">Scott McQueen</p>
            <p class="footer-copy">Trusted reporting, analytics modernization, and executive-ready decision support.</p>
          </div>
          <p class="footer-meta">&copy; {{ site.time | date: '%Y' }} Scott McQueen</p>
        </div>
      </div>
    </footer>
  </body>
</html>
